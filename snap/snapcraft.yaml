name: yazses
base: core24
version: "1.4.1"
summary: Local, offline voice dictation for Linux
description: |
  YazSes is offline, on-device voice dictation. Hold a key (Space by default),
  speak, release — your words are transcribed locally and typed into whatever
  app has focus. No cloud, no API key, no subscription; nothing leaves your
  machine.

  - Offline speech-to-text with faster-whisper (CPU, int8) — no GPU needed
  - Voice commands for editors and terminals: "undo that", "save file",
    "go to line 42", "run the tests", "rename this to user_id"
  - Personal vocabulary and multi-step macros
  - Works in any focused text field — editors, browsers, terminals, chat

  Note: this is a strictly-confined snap; keystroke injection works on X11
  sessions. For Wayland or full input access, install via pipx instead:
  https://pypi.org/project/yazses/

  Install:  sudo snap install yazses

title: YazSes
icon: snap/gui/yazses.png
contact: mohsen.seyedkazemi@gmail.com
license: Apache-2.0
website: https://mskazemi.github.io/yazses/
source-code: https://github.com/MSKazemi/yazses
issues: https://github.com/MSKazemi/yazses/issues

grade: stable
confinement: strict

apps:
  yazses:
    command: bin/yazses-wrapper
    plugs:
      - audio-record
      - audio-playback
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - home
      - network
      - opengl
  yazses-daemon:
    command: bin/yazses-daemon-wrapper
    plugs:
      - audio-record
      - audio-playback
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - home
      - network
      - opengl
  yazses-overlay:
    command: bin/yazses-overlay-wrapper
    plugs:
      - desktop
      - x11
      - wayland
      - opengl
  yazses-tray:
    command: bin/yazses-tray-wrapper
    plugs:
      - desktop
      - x11
      - wayland
      - home

parts:
  yazses:
    plugin: python
    source: .
    build-packages:
      - python3-dev
    stage-packages:
      - libportaudio2
      - python3.12
      - python3.12-minimal
      - libpython3.12-minimal
      - libpython3.12-stdlib
      - python3-pip-whl
      - python3-xlib
      # Qt runtime libs for the bundled PySide6 overlay (yazses-overlay). The
      # PySide6 wheel ships Qt itself but relies on these system libs to load
      # the xcb/wayland platform plugins under strict confinement.
      - libgl1
      - libegl1
      - libxkbcommon0
      - libxcb-cursor0
      - libxcb-xinerama0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libfontconfig1
      - libdbus-1-3
    python-packages:
      - pip
    # snapcraft's python plugin runs a fix-python-shebang helper that searches
    # for /usr/bin/python3.12 in the staged payload. Stage-packages installs
    # python3.12 to /usr/bin, but on some core24 versions the binary lands in
    # an unexpected location; the symlink below is a defensive belt-and-braces
    # so the helper finds it.
    override-build: |
      craftctl default
      mkdir -p "$CRAFT_PART_INSTALL/usr/bin"
      if [ ! -e "$CRAFT_PART_INSTALL/usr/bin/python3.12" ]; then
        ln -sf /usr/bin/python3.12 "$CRAFT_PART_INSTALL/usr/bin/python3.12"
      fi
      install -Dm755 snap/local/yazses-wrapper "$CRAFT_PART_INSTALL/bin/yazses-wrapper"
      install -Dm755 snap/local/yazses-daemon-wrapper "$CRAFT_PART_INSTALL/bin/yazses-daemon-wrapper"
      install -Dm755 snap/local/yazses-overlay-wrapper "$CRAFT_PART_INSTALL/bin/yazses-overlay-wrapper"
      install -Dm755 snap/local/yazses-tray-wrapper "$CRAFT_PART_INSTALL/bin/yazses-tray-wrapper"
      # XDG autostart so the daemon's DISPLAY is populated on every graphical login
      install -Dm644 contrib/yazses-session.desktop \
        "$CRAFT_PART_INSTALL/etc/xdg/autostart/yazses-session.desktop"
