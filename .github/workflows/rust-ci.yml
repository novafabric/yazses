name: Rust CI

on:
  push:
    branches: ["v1.0-dev", "main"]
    paths: ["crates/**", "Cargo.toml", "Cargo.lock", ".github/workflows/rust-ci.yml"]
  pull_request:
    branches: ["v1.0-dev", "main"]
    paths: ["crates/**", "Cargo.toml", "Cargo.lock"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        # Windows runner added when KeyboardHoldBackend Windows port lands (Phase 7).

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check
