name: Rust Release

# Triggers on v1.x.x tags only — Python v0.4.x tags use release.yml.
on:
  push:
    tags:
      - "v1.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0-dev.1)"
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Cross-platform binary builds ───────────────────────────────────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux x86_64: native ALSA build
      - name: Install ALSA (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get install -y libasound2-dev

      # Linux aarch64: use cross for cross-compilation
      - name: Install cross (aarch64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} -p yazses-core -p yazses-cli
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} -p yazses-core -p yazses-cli

      # ── Package archives ──────────────────────────────────────────────────

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME:-${{ inputs.tag }}}
          STEM="yazses-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/$STEM"
          cp target/${{ matrix.target }}/release/yazses      "dist/$STEM/"
          cp target/${{ matrix.target }}/release/yazses-daemon "dist/$STEM/"
          cp README.md LICENSE                               "dist/$STEM/" 2>/dev/null || true
          tar -C dist -czf "dist/${STEM}.tar.gz" "$STEM"
          echo "ASSET=dist/${STEM}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag  = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ inputs.tag }}" }
          $stem = "yazses-${tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist\$stem" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\yazses.exe"        "dist\$stem\"
          Copy-Item "target\${{ matrix.target }}\release\yazses-daemon.exe" "dist\$stem\"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist\$stem\" }
          if (Test-Path "LICENSE")   { Copy-Item "LICENSE"   "dist\$stem\" }
          Compress-Archive -Path "dist\$stem" -DestinationPath "dist\${stem}.zip"
          "ASSET=dist/${stem}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Debian package ─────────────────────────────────────────────────────────
  deb:
    name: deb (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install ALSA + cargo-deb
        run: |
          sudo apt-get install -y libasound2-dev
          cargo install cargo-deb

      - name: Build .deb
        run: cargo deb -p yazses-core --no-build
        # --no-build because we build separately to share the cache

      - name: Build binary first
        run: cargo build --release -p yazses-core -p yazses-cli

      - name: Build .deb (with binary)
        run: cargo deb -p yazses-core

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/debian/*.deb

  # ── RPM package ────────────────────────────────────────────────────────────
  rpm:
    name: rpm (x86_64)
    runs-on: ubuntu-22.04
    container: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y alsa-lib-devel gcc make curl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build
        run: cargo build --release -p yazses-core -p yazses-cli

      - name: Build .rpm
        run: cargo generate-rpm -p crates/yazses-core

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: target/generate-rpm/*.rpm

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build, deb, rpm]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.deb
            dist/**/*.rpm
          body: |
            ## YazSes ${{ github.ref_name }} — Rust core

            > **Development pre-release.** The v1.0 Rust daemon is feature-complete
            > through Phase 6 but binaries are not yet production-hardened.

            ### Install (Linux x86_64)

            **APT (.deb):**
            ```bash
            sudo apt install ./yazses_*.deb
            ```

            **Binary (any Linux):**
            ```bash
            tar xzf yazses-*-x86_64-unknown-linux-gnu.tar.gz
            sudo install yazses-*/yazses /usr/local/bin/
            sudo install yazses-*/yazses-daemon /usr/local/bin/
            ```

            ### macOS (Apple Silicon)
            ```bash
            tar xzf yazses-*-aarch64-apple-darwin.tar.gz
            sudo install yazses-*/yazses /usr/local/bin/
            sudo install yazses-*/yazses-daemon /usr/local/bin/
            ```

            ### Windows (x86_64)
            Extract `yazses-*-x86_64-pc-windows-msvc.zip` and run `yazses.exe`.

            ### What's new
            See the full [CHANGELOG](https://github.com/novafabric/yazses/blob/v1.0-dev/CHANGELOG.md).
