ShortDescription: Local, offline, hold-to-talk voice dictation — agentic OS layer (Rust core)
Description: |-
  YazSes v1.0 is a cross-platform, offline hold-to-talk voice dictation daemon
  built on a Rust core. Hold a key, speak, release — text appears in any focused
  window. No cloud, no GPU, no subscription.

  v1.0 ships the full agentic OS layer: LLM tool dispatch via llama.cpp/MLX,
  personal encrypted memory (sqlite-vec), editor context injection for Neovim
  and VSCode via LSP bridges, multi-backend STT routing (faster-whisper / whisper.cpp),
  AT-SPI and NVDA screen-reader integration, and a zero-telemetry privacy model.
  All processing is on-device.
