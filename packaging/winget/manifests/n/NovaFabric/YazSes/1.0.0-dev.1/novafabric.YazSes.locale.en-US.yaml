ShortDescription: Local, offline, hold-to-talk voice dictation — agentic OS layer
Description: |-
  YazSes is a cross-platform, offline hold-to-talk voice dictation daemon.
  Hold a key, speak, release — text appears in any focused window.
  No cloud, no GPU, no subscription. v1.0 adds a full Rust-core agentic
  layer: LLM tool dispatch, personal encrypted memory, editor context
  injection, and multi-backend STT routing.
